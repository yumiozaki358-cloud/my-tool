<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>My Tool</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <header class="header">
    <div class="container">
      <div class="logo">My Tool</div>
      <nav>
        <a href="#features">機能</a>
        <a href="#cta" class="btn btn-outline">始める</a>
      </nav>
    </div>
  </header>

  <section class="hero">
    <div class="container">
      <h1>作業をもっと、<span>スマートに。</span></h1>
      <p>My Tool はあなたの日々のワークフローを自動化し、生産性を高めるためのシンプルなツールです。</p>
      <a href="#cta" class="btn btn-primary">無料で試す</a>
    </div>
  </section>

  <section class="features" id="features">
    <div class="container">
      <h2>主な機能</h2>
      <div class="cards">
        <div class="card">
          <div class="icon">⚡</div>
          <h3>高速処理</h3>
          <p>数秒で結果を出力。待ち時間ゼロの快適な操作感。</p>
        </div>
        <div class="card">
          <div class="icon">🔒</div>
          <h3>安全・安心</h3>
          <p>データはすべてローカルで処理。外部送信は一切ありません。</p>
        </div>
        <div class="card">
          <div class="icon">🎯</div>
          <h3>シンプル設計</h3>
          <p>直感的な UI で、誰でもすぐに使いこなせます。</p>
        </div>
      </div>
    </div>
  </section>

  <section class="cta" id="cta">
    <div class="container">
      <h2>今すぐ始めましょう</h2>
      <p>無料プランで今日からご利用いただけます。</p>
      <form class="cta-form">
        <input type="email" placeholder="メールアドレスを入力" required />
        <button type="submit" class="btn btn-primary">登録する</button>
      </form>
    </div>
  </section>

  <footer class="footer">
    <div class="container">
      <p>&copy; 2026 My Tool. All rights reserved.</p>
    </div>
  </footer>
</body>
</html>
